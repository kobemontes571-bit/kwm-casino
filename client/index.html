<!DOCTYPE html>
<html>
<head>
  <title>KWM Casino</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      text-align: center;
    }

    .title {
      font-size: 40px;
      color: #ff004c;
      margin-top: 20px;
    }

    .card {
      margin: 20px;
      padding: 20px;
      border: 1px solid #333;
      border-radius: 10px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #00d4ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .reels {
      font-size: 40px;
      margin: 20px;
    }

    .bonus {
      color: #ffd700;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="title">🎰 KWM Casino</div>
  <p>Neon Texas Edition</p>

  <div class="card">
    <h2>🎰 Neon Rodeo</h2>

    <div class="reels" id="reels">- - -</div>

    <button onclick="spin()">SPIN</button>

    <h3 id="win"></h3>
    <div class="bonus" id="bonus"></div>
  </div>

<script>
const API_URL = "https://kwm-casino.onrender.com/";

async function spin() {
  document.getElementById("win").innerText = "Spinning...";
  document.getElementById("bonus").innerText = "";

  const res = await fetch(API_URL, {
    method: "POST"
  });

  const data = await res.json();

  document.getElementById("reels").innerText = data.reels.join(" ");
  document.getElementById("win").innerText = "Win: " + data.win;

  if (data.bonus.freeSpins) {
    document.getElementById("bonus").innerText = "🔥 FREE SPINS TRIGGERED!";
  } else if (data.bonus.wheelBonus) {
    document.getElementById("bonus").innerText = "🎡 WHEEL BONUS!";
  }
}
</script>

</body>
</html>
